<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8">
    <title>HTML</title>
    <style>
        h1 {
            font-family: sans-serif;
        }

        body {
            font-size: 16px;
        }

        p {
            font-weight: 600;
            font-size: 3em;
        }

        ul {
            font-style: italic;
            line-height: 105px;
            text-align: center;
            text-decoration: dashed;

        #amarelo {
            background-color: yellow;
        }
        #vermelho {
            background-color: red;
        }

        #marrom {
            background-color: rgb(77, 38, 6);
        }
    </style>
  </head>
  <body>
    <h1>Cores</h1>
    <p>Qual é a sua cor favorita?</p>
    <ul>
      <li id="amarelo">Amarelo</li>
      <li id="vermelho">Vermelho</li>
      <li id="marrom">Marrom</li>
    </ul>
  </body>
</html>
